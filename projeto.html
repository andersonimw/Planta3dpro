<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projeto — Planta 3D Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--black:#0A0A0A;--dark:#111111;--card:#181818;--wine:#7B1C2E;--wine-light:#9B2236;--wine-dark:#5A1020;--orange:#E8621A;--orange-light:#FF7A30;--orange-dim:rgba(232,98,26,0.15);--text:#F0EDE8;--muted:#888;--border:rgba(123,28,46,0.3)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Barlow',sans-serif;background:var(--black);color:var(--text);min-height:100vh}
nav{background:rgba(10,10,10,0.97);backdrop-filter:blur(12px);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border)}
.logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--text);text-decoration:none}
.logo span{color:var(--orange)}
.back-btn{background:rgba(255,255,255,0.06);border:1px solid var(--border);color:var(--text);padding:8px 16px;border-radius:8px;font-family:'Barlow',sans-serif;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;letter-spacing:0.5px}
.carrossel-wrap{background:var(--dark);border-bottom:1px solid var(--border)}
.carrossel-inner{max-width:1100px;margin:0 auto;padding:0 24px}
.carrossel{position:relative;width:100%;height:340px;overflow:hidden;border-radius:0 0 14px 14px}
.carrossel-track{display:flex;height:100%;transition:transform .4s ease}
.carrossel-item{min-width:100%;height:100%;position:relative;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1A0810,#1A0D05)}
.carrossel-item img{width:100%;height:100%;object-fit:cover}
.carrossel-item video{width:100%;height:100%;object-fit:cover;cursor:pointer}
.play-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.3);transition:opacity .3s;pointer-events:none}
.play-overlay.hidden{opacity:0}
.play-btn-big{width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,.9);display:flex;align-items:center;justify-content:center;font-size:26px}
.carrossel-btn{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.6);color:#fff;border:1px solid var(--border);width:44px;height:44px;border-radius:50%;font-size:20px;cursor:pointer;z-index:10;display:flex;align-items:center;justify-content:center}
.carrossel-btn.prev{left:12px}
.carrossel-btn.next{right:12px}
.carrossel-dots{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:6px}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.4);cursor:pointer;transition:all .2s}
.dot.active{background:var(--orange);transform:scale(1.3)}
.carrossel-counter{position:absolute;top:12px;right:12px;background:rgba(0,0,0,.7);color:#fff;font-size:12px;font-weight:600;padding:4px 10px;border-radius:20px;font-family:'Barlow',sans-serif}
.tipo-badge-vid{position:absolute;top:12px;left:12px;background:rgba(0,0,0,.7);color:#fff;font-size:12px;padding:4px 10px;border-radius:20px;font-family:'Barlow',sans-serif}
.thumbnails{display:flex;gap:8px;padding:14px 0;overflow-x:auto;scrollbar-width:none}
.thumb{min-width:64px;height:64px;border-radius:8px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:all .2s;position:relative;flex-shrink:0}
.thumb.active{border-color:var(--orange)}
.thumb img,.thumb video{width:100%;height:100%;object-fit:cover}
.thumb-vid-icon{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.4);font-size:18px}
.page{max-width:1100px;margin:0 auto;padding:0 24px 120px}
.content-grid{display:grid;grid-template-columns:1fr;gap:24px;padding-top:28px}
.badge{display:inline-block;background:rgba(123,28,46,0.2);color:var(--wine-light);font-size:12px;font-weight:700;padding:4px 14px;border-radius:20px;margin-bottom:12px;text-transform:uppercase;letter-spacing:1px;border:1px solid var(--border)}
h1{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:2px;margin-bottom:20px;line-height:1.1;color:var(--text)}
.specs-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px}
.spec-card{background:var(--card);border-radius:10px;padding:14px;text-align:center;border:1px solid var(--border)}
.spec-icon{font-size:20px;margin-bottom:4px}
.spec-value{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--orange);letter-spacing:1px}
.spec-label{font-size:11px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:0.5px}
.price-box{background:linear-gradient(135deg,#1A0810,#0A0A0A);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:24px;text-align:center}
.price-old{font-size:15px;color:var(--muted);text-decoration:line-through;margin-bottom:4px}
.price-new{font-family:'Bebas Neue',sans-serif;font-size:48px;color:var(--orange);letter-spacing:2px}
.price-pix{font-size:14px;color:var(--muted);margin-top:6px}
.price-pix span{color:#25D366;font-weight:700}
.checklist{margin-bottom:24px}
.checklist h3{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;margin-bottom:14px;color:var(--text)}
.check-item{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:14px;color:var(--muted)}
.check-item span{color:var(--orange);font-size:16px}
.entrega-box{background:var(--card);border-radius:12px;padding:18px;margin-bottom:24px;border-left:3px solid var(--orange)}
.entrega-box h3{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;margin-bottom:8px;color:var(--orange)}
.entrega-box p{font-size:13px;color:var(--muted);line-height:1.6}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;padding:14px 20px;background:rgba(10,10,10,0.97);border-top:1px solid var(--border);display:flex;gap:10px;z-index:100;backdrop-filter:blur(12px)}
.btn-wpp{background:#25D366;color:#fff;font-weight:700;font-size:15px;padding:14px 18px;border:none;border-radius:10px;font-family:'Barlow',sans-serif;cursor:pointer;white-space:nowrap}
.btn-comprar{flex:1;background:linear-gradient(135deg,var(--orange),var(--wine));color:#fff;font-weight:800;font-size:15px;padding:14px;border:none;border-radius:10px;font-family:'Barlow',sans-serif;cursor:pointer;letter-spacing:0.5px;text-transform:uppercase}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;align-items:flex-end;justify-content:center}
.modal.open{display:flex}
.modal-box{background:var(--card);width:100%;max-width:500px;border-radius:20px 20px 0 0;padding:28px 24px 40px;border-top:1px solid var(--border)}
.modal-box h2{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:1px;margin-bottom:6px;color:var(--text)}
.modal-box p{font-size:14px;color:var(--muted);margin-bottom:20px}
.pgto-option{background:var(--dark);border-radius:12px;padding:16px;margin-bottom:10px;display:flex;align-items:center;gap:14px;cursor:pointer;border:1px solid var(--border);transition:all .2s}
.pgto-option:hover{border-color:var(--orange)}
.pgto-icon{font-size:26px}
.pgto-info strong{display:block;font-size:15px;color:var(--text)}
.pgto-info span{font-size:13px;color:var(--muted)}
.modal-close{width:100%;background:rgba(255,255,255,0.06);color:var(--text);font-size:15px;font-weight:700;padding:14px;border:1px solid var(--border);border-radius:10px;font-family:'Barlow',sans-serif;cursor:pointer;margin-top:10px}
.loading{display:flex;align-items:center;justify-content:center;min-height:300px;font-size:14px;color:var(--muted)}
@media(min-width:768px){
  .carrossel{height:480px}
  .content-grid{grid-template-columns:1fr 1fr;align-items:start}
  h1{font-size:42px}
  .bottom-bar{max-width:1100px;left:50%;transform:translateX(-50%);border-radius:14px 14px 0 0}
  .modal{align-items:center}
  .modal-box{border-radius:16px;margin:20px}
}
@media(min-width:1024px){.carrossel{height:560px}}
</style>
</head>
<body>
<nav>
  <a href="/" class="logo">PLANTA <span>3D</span> PRO</a>
  <a href="/" class="back-btn">← Voltar</a>
</nav>
<div id="app"><div class="loading">Carregando projeto...</div></div>
<div class="modal" id="modal">
  <div class="modal-box">
    <h2>💳 Finalizar Compra</h2>
    <p id="modal-titulo">Escolha a forma de pagamento</p>
    <div class="pgto-option" onclick="irWhatsApp('Pix')"><div class="pgto-icon">💚</div><div class="pgto-info"><strong>Pix</strong><span id="pix-preco">10% de desconto</span></div></div>
    <div class="pgto-option" onclick="irWhatsApp('Cartão')"><div class="pgto-icon">💳</div><div class="pgto-info"><strong>Cartão de Crédito</strong><span>Em até 12x sem juros</span></div></div>
    <div class="pgto-option" onclick="irWhatsApp('Boleto')"><div class="pgto-icon">📄</div><div class="pgto-info"><strong>Boleto Bancário</strong><span>Vencimento em 3 dias úteis</span></div></div>
    <button class="modal-close" onclick="fecharModal()">Cancelar</button>
  </div>
</div>
<script>
let projeto=null,midiaAtual=0,midias=[];
const params=new URLSearchParams(window.location.search);
const codigo=params.get('codigo');
async function carregar(){
  try{
    const res=await fetch('/projeto/'+codigo);
    if(!res.ok){document.getElementById('app').innerHTML='<div class="loading">Projeto não encontrado.</div>';return;}
    projeto=await res.json();
    midias=projeto.midia&&projeto.midia.length>0?projeto.midia:(projeto.foto?[{url:projeto.foto,tipo:'imagem'}]:[]);
    renderizar();
  }catch(e){document.getElementById('app').innerHTML='<div class="loading">Erro ao carregar.</div>';}
}
function renderizar(){
  const precoNum=parseFloat(projeto.preco)||0;
  const precoOriginal=(precoNum*1.15).toFixed(0);
  const precoPix=(precoNum*0.9).toFixed(0);
  document.title=projeto.titulo+' — Planta 3D Pro';
  const carrosselHTML=midias.length>0?`
    <div class="carrossel-wrap"><div class="carrossel-inner">
      <div class="carrossel" id="carrossel">
        <div class="carrossel-track" id="track">
          ${midias.map((m,i)=>`<div class="carrossel-item" id="item-${i}">${m.tipo==='video'?`<video id="vid-${i}" src="${m.url}" playsinline preload="auto"></video><div class="play-overlay" id="overlay-${i}" onclick="togglePlay(${i})"><div class="play-btn-big">▶</div></div><div class="tipo-badge-vid">🎥 Vídeo</div>`:`<img src="${m.url}" alt="Foto ${i+1}">`}</div>`).join('')}
        </div>
        ${midias.length>1?`<button class="carrossel-btn prev" onclick="moverCarrossel(-1)">‹</button><button class="carrossel-btn next" onclick="moverCarrossel(1)">›</button><div class="carrossel-dots">${midias.map((_,i)=>`<div class="dot ${i===0?'active':''}" onclick="irPara(${i})"></div>`).join('')}</div><div class="carrossel-counter"><span id="counter">1</span>/${midias.length}</div>`:''}
      </div>
      ${midias.length>1?`<div class="thumbnails" id="thumbs">${midias.map((m,i)=>`<div class="thumb ${i===0?'active':''}" onclick="irPara(${i})" id="thumb-${i}">${m.tipo==='video'?`<video src="${m.url}" preload="metadata"></video><div class="thumb-vid-icon">▶</div>`:`<img src="${m.url}">`}</div>`).join('')}</div>`:''}
    </div></div>`:'<div style="height:200px;background:var(--dark);display:flex;align-items:center;justify-content:center;font-size:40px">🏠</div>';
  document.getElementById('app').innerHTML=`
    ${carrosselHTML}
    <div class="page"><div class="content-grid">
      <div>
        <div class="badge">${getCat(projeto.categoria)}</div>
        <h1>${projeto.titulo}</h1>
        <div class="specs-grid">
          <div class="spec-card"><div class="spec-icon">📐</div><div class="spec-value">${projeto.area}m²</div><div class="spec-label">Área total</div></div>
          <div class="spec-card"><div class="spec-icon">🛏️</div><div class="spec-value">${projeto.quartos}</div><div class="spec-label">Quartos</div></div>
          <div class="spec-card"><div class="spec-icon">🚗</div><div class="spec-value">${projeto.vagas}</div><div class="spec-label">Vagas</div></div>
          <div class="spec-card"><div class="spec-icon">🚿</div><div class="spec-value">${projeto.banheiros}</div><div class="spec-label">Banheiros</div></div>
          <div class="spec-card"><div class="spec-icon">📏</div><div class="spec-value">${projeto.terreno}</div><div class="spec-label">Terreno</div></div>
          <div class="spec-card"><div class="spec-icon">🏷️</div><div class="spec-value">${projeto.codigo}</div><div class="spec-label">Código</div></div>
        </div>
        <div class="checklist">
          <h3>✅ O que você vai receber</h3>
          <div class="check-item"><span>✔</span>Planta baixa completa</div>
          <div class="check-item"><span>✔</span>Planta de cobertura</div>
          <div class="check-item"><span>✔</span>Cortes e fachadas</div>
          <div class="check-item"><span>✔</span>Perspectiva 3D externa</div>
          <div class="check-item"><span>✔</span>Arquivos DWG + PDF</div>
          <div class="check-item"><span>✔</span>Entrega em até 24h</div>
        </div>
      </div>
      <div>
        <div class="price-box">
          <div class="price-old">De R$ ${precoOriginal}</div>
          <div class="price-new">R$ ${projeto.preco}</div>
          <div class="price-pix">💚 No Pix: <span>R$ ${precoPix} (10% off)</span></div>
        </div>
        <div class="entrega-box">
          <h3>⚡ Entrega Rápida</h3>
          <p>Após confirmação do pagamento, você recebe todos os arquivos por e-mail ou WhatsApp em até 24 horas úteis.</p>
        </div>
      </div>
    </div></div>
    <div class="bottom-bar">
      <button class="btn-wpp" onclick="abrirWpp()">💬 WhatsApp</button>
      <button class="btn-comprar" onclick="abrirModal()">🛒 COMPRAR — R$ ${projeto.preco}</button>
    </div>`;
  verificarVideo(0);
}
function verificarVideo(i){const v=document.getElementById('vid-'+i);if(!v)return;v.play().then(()=>{const o=document.getElementById('overlay-'+i);if(o)o.classList.add('hidden');}).catch(()=>{});}
function pararTodosVideos(){midias.forEach((_,i)=>{const v=document.getElementById('vid-'+i);if(v){v.pause();v.currentTime=0;const o=document.getElementById('overlay-'+i);if(o)o.classList.remove('hidden');}});}
function togglePlay(i){const v=document.getElementById('vid-'+i);const o=document.getElementById('overlay-'+i);if(!v)return;if(v.paused){v.play();if(o)o.classList.add('hidden');}else{v.pause();if(o)o.classList.remove('hidden');}}
function moverCarrossel(dir){pararTodosVideos();midiaAtual=(midiaAtual+dir+midias.length)%midias.length;atualizarCarrossel();setTimeout(()=>verificarVideo(midiaAtual),400);}
function irPara(i){pararTodosVideos();midiaAtual=i;atualizarCarrossel();setTimeout(()=>verificarVideo(midiaAtual),400);}
function atualizarCarrossel(){const t=document.getElementById('track');if(t)t.style.transform=`translateX(-${midiaAtual*100}%)`;document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===midiaAtual));document.querySelectorAll('.thumb').forEach((t,i)=>t.classList.toggle('active',i===midiaAtual));const c=document.getElementById('counter');if(c)c.textContent=midiaAtual+1;const th=document.getElementById('thumb-'+midiaAtual);if(th)th.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});}
function getCat(c){return{terrea:'Casa Térrea',sobrado:'Sobrado',comercial:'Comercial',alto:'Alto Padrão'}[c]||c;}
function abrirModal(){document.getElementById('modal-titulo').textContent='Projeto: '+projeto.titulo;document.getElementById('pix-preco').textContent='R$ '+(parseFloat(projeto.preco)*0.9).toFixed(0)+' (10% off)';document.getElementById('modal').classList.add('open');}
function fecharModal(){document.getElementById('modal').classList.remove('open');}
function irWhatsApp(pgto){const msg=encodeURIComponent('Olá! Quero comprar o projeto '+projeto.codigo+' — '+projeto.titulo+'. Forma de pagamento: '+pgto+'. Valor: R$ '+projeto.preco);window.open('https://wa.me/5521978819116?text='+msg,'_blank');fecharModal();}
function abrirWpp(){const msg=encodeURIComponent('Olá! Tenho interesse no projeto '+projeto.codigo+' — '+projeto.titulo);window.open('https://wa.me/5521978819116?text='+msg,'_blank');}
carregar();
</script>
</body>
</html>
