<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projeto — Planta 3D Pro</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#0F172A;color:#fff}
.carrossel{position:relative;width:100%;height:300px;background:#1E293B;overflow:hidden}
.carrossel-track{display:flex;height:100%;transition:transform .4s ease}
.carrossel-item{min-width:100%;height:100%;position:relative}
.carrossel-item img{width:100%;height:100%;object-fit:cover}
.carrossel-item video{width:100%;height:100%;object-fit:cover}
.carrossel-btn{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.5);color:#fff;border:none;width:40px;height:40px;border-radius:50%;font-size:18px;cursor:pointer;z-index:10;display:flex;align-items:center;justify-content:center}
.carrossel-btn.prev{left:10px}
.carrossel-btn.next{right:10px}
.carrossel-dots{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:6px}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.4);cursor:pointer;transition:all .2s}
.dot.active{background:#22C55E;transform:scale(1.3)}
.carrossel-counter{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.6);color:#fff;font-size:12px;font-weight:600;padding:4px 10px;border-radius:20px}
.tipo-badge-vid{position:absolute;top:10px;left:10px;background:rgba(0,0,0,.6);color:#fff;font-size:12px;padding:4px 10px;border-radius:20px}
.thumbnails{display:flex;gap:8px;padding:12px 16px;overflow-x:auto;background:#1E293B}
.thumbnails::-webkit-scrollbar{height:4px}
.thumbnails::-webkit-scrollbar-track{background:#0F172A}
.thumbnails::-webkit-scrollbar-thumb{background:#334155;border-radius:2px}
.thumb{min-width:60px;height:60px;border-radius:8px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:all .2s;position:relative}
.thumb.active{border-color:#22C55E}
.thumb img,.thumb video{width:100%;height:100%;object-fit:cover}
.thumb-vid-icon{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.3);font-size:16px}
.content{padding:20px 16px;padding-bottom:100px}
.badge{display:inline-block;background:#22C55E20;color:#22C55E;font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px;margin-bottom:12px;text-transform:uppercase}
h1{font-size:22px;font-weight:800;margin-bottom:16px;line-height:1.3}
.specs-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.spec-card{background:#1E293B;border-radius:10px;padding:12px;text-align:center}
.spec-icon{font-size:20px;margin-bottom:4px}
.spec-value{font-size:16px;font-weight:800;color:#22C55E}
.spec-label{font-size:11px;color:#64748B;margin-top:2px}
.price-box{background:linear-gradient(135deg,#1E293B,#0F172A);border:1px solid #22C55E30;border-radius:14px;padding:20px;margin-bottom:20px;text-align:center}
.price-old{font-size:15px;color:#64748B;text-decoration:line-through;margin-bottom:4px}
.price-new{font-size:32px;font-weight:900;color:#22C55E}
.price-pix{font-size:13px;color:#94A3B8;margin-top:4px}
.entrega-box{background:#1E293B;border-radius:12px;padding:16px;margin-bottom:20px;border-left:3px solid #22C55E}
.entrega-box h3{font-size:14px;font-weight:700;margin-bottom:8px;color:#22C55E}
.entrega-box p{font-size:13px;color:#94A3B8;line-height:1.6}
.checklist{margin-bottom:24px}
.checklist h3{font-size:16px;font-weight:700;margin-bottom:12px}
.check-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #1E293B;font-size:14px;color:#CBD5E1}
.check-item span{color:#22C55E;font-size:16px}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;padding:12px 16px;background:#0F172A;border-top:1px solid #1E293B;display:flex;gap:10px;z-index:100}
.btn-wpp{flex:1;background:#25D366;color:#fff;font-weight:700;font-size:15px;padding:14px;border:none;border-radius:10px;font-family:inherit;cursor:pointer}
.btn-comprar{flex:2;background:linear-gradient(135deg,#22C55E,#16A34A);color:#fff;font-weight:800;font-size:15px;padding:14px;border:none;border-radius:10px;font-family:inherit;cursor:pointer}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;align-items:flex-end}
.modal.open{display:flex}
.modal-box{background:#1E293B;width:100%;border-radius:20px 20px 0 0;padding:24px 20px 40px}
.modal-box h2{font-size:18px;font-weight:800;margin-bottom:6px}
.modal-box p{font-size:14px;color:#94A3B8;margin-bottom:20px}
.pgto-option{background:#0F172A;border-radius:12px;padding:16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;cursor:pointer;border:2px solid transparent;transition:all .2s}
.pgto-option:hover{border-color:#22C55E}
.pgto-icon{font-size:24px}
.pgto-info strong{display:block;font-size:15px}
.pgto-info span{font-size:13px;color:#64748B}
.modal-close{width:100%;background:#334155;color:#fff;font-size:15px;font-weight:700;padding:14px;border:none;border-radius:10px;font-family:inherit;cursor:pointer;margin-top:10px}
.loading{display:flex;align-items:center;justify-content:center;min-height:300px;font-size:14px;color:#64748B}
</style>
</head>
<body>

<div id="app"><div class="loading">Carregando projeto...</div></div>

<div class="modal" id="modal">
<div class="modal-box">
<h2>💳 Finalizar Compra</h2>
<p id="modal-titulo">Escolha a forma de pagamento</p>
<div class="pgto-option" onclick="irWhatsApp('Pix')">
<div class="pgto-icon">💚</div>
<div class="pgto-info"><strong>Pix</strong><span id="pix-preco">10% de desconto</span></div>
</div>
<div class="pgto-option" onclick="irWhatsApp('Cartão')">
<div class="pgto-icon">💳</div>
<div class="pgto-info"><strong>Cartão de Crédito</strong><span>Em até 12x sem juros</span></div>
</div>
<div class="pgto-option" onclick="irWhatsApp('Boleto')">
<div class="pgto-icon">📄</div>
<div class="pgto-info"><strong>Boleto Bancário</strong><span>Vencimento em 3 dias úteis</span></div>
</div>
<button class="modal-close" onclick="fecharModal()">Cancelar</button>
</div>
</div>

<script>
let projeto=null;
let midiaAtual=0;
let midias=[];

const params=new URLSearchParams(window.location.search);
const codigo=params.get('codigo');

async function carregar(){
  const res=await fetch('/projeto/'+codigo);
  if(!res.ok){document.getElementById('app').innerHTML='<div class="loading">Projeto não encontrado.</div>';return;}
  projeto=await res.json();
  midias=projeto.midia&&projeto.midia.length>0?projeto.midia:(projeto.foto?[{url:projeto.foto,tipo:'imagem'}]:[]);
  renderizar();
}

function renderizar(){
  const precoNum=parseFloat(projeto.preco)||0;
  const precoOriginal=(precoNum*1.15).toFixed(0);
  const precoPix=(precoNum*0.9).toFixed(0);
  document.title=projeto.titulo+' — Planta 3D Pro';

  const carrosselHTML=midias.length>0?`
    <div class="carrossel" id="carrossel">
      <div class="carrossel-track" id="track">
        ${midias.map((m,i)=>`
          <div class="carrossel-item">
            ${m.tipo==='video'
              ?`<video src="${m.url}" ${i===0?'autoplay':''} muted loop playsinline></video><div class="tipo-badge-vid">🎥 Vídeo</div>`
              :`<img src="${m.url}" alt="Foto ${i+1}">`}
          </div>`).join('')}
      </div>
      ${midias.length>1?`
        <button class="carrossel-btn prev" onclick="moverCarrossel(-1)">‹</button>
        <button class="carrossel-btn next" onclick="moverCarrossel(1)">›</button>
        <div class="carrossel-dots">${midias.map((_,i)=>`<div class="dot ${i===0?'active':''}" onclick="irPara(${i})"></div>`).join('')}</div>
        <div class="carrossel-counter"><span id="counter">1</span>/${midias.length}</div>`:''}
    </div>
    ${midias.length>1?`
      <div class="thumbnails" id="thumbs">
        ${midias.map((m,i)=>`
          <div class="thumb ${i===0?'active':''}" onclick="irPara(${i})" id="thumb-${i}">
            ${m.tipo==='video'
              ?`<video src="${m.url}" muted></video><div class="thumb-vid-icon">▶</div>`
              :`<img src="${m.url}">`}
          </div>`).join('')}
      </div>`:''}
  `:'<div style="height:200px;background:#1E293B;display:flex;align-items:center;justify-content:center;font-size:40px">🏠</div>';

  document.getElementById('app').innerHTML=`
    ${carrosselHTML}
    <div class="content">
      <div class="badge">${getCat(projeto.categoria)}</div>
      <h1>${projeto.titulo}</h1>
      <div class="specs-grid">
        <div class="spec-card"><div class="spec-icon">📐</div><div class="spec-value">${projeto.area}m²</div><div class="spec-label">Área total</div></div>
        <div class="spec-card"><div class="spec-icon">🛏️</div><div class="spec-value">${projeto.quartos}</div><div class="spec-label">Quartos</div></div>
        <div class="spec-card"><div class="spec-icon">🚗</div><div class="spec-value">${projeto.vagas}</div><div class="spec-label">Vagas</div></div>
        <div class="spec-card"><div class="spec-icon">🚿</div><div class="spec-value">${projeto.banheiros}</div><div class="spec-label">Banheiros</div></div>
        <div class="spec-card"><div class="spec-icon">📏</div><div class="spec-value">${projeto.terreno}</div><div class="spec-label">Terreno</div></div>
        <div class="spec-card"><div class="spec-icon">🏷️</div><div class="spec-value">${projeto.codigo}</div><div class="spec-label">Código</div></div>
      </div>
      <div class="price-box">
        <div class="price-old">De R$ ${precoOriginal}</div>
        <div class="price-new">R$ ${projeto.preco}</div>
        <div class="price-pix">💚 No Pix: R$ ${precoPix} (10% off)</div>
      </div>
      <div class="checklist">
        <h3>✅ O que você vai receber</h3>
        <div class="check-item"><span>✔</span>Planta baixa completa</div>
        <div class="check-item"><span>✔</span>Planta de cobertura</div>
        <div class="check-item"><span>✔</span>Cortes e fachadas</div>
        <div class="check-item"><span>✔</span>Perspectiva 3D externa</div>
        <div class="check-item"><span>✔</span>Arquivos DWG + PDF</div>
        <div class="check-item"><span>✔</span>Entrega em até 24h</div>
      </div>
      <div class="entrega-box">
        <h3>⚡ Entrega Rápida</h3>
        <p>Após confirmação do pagamento, você recebe todos os arquivos por e-mail ou WhatsApp em até 24 horas úteis.</p>
      </div>
    </div>
    <div class="bottom-bar">
      <button class="btn-wpp" onclick="abrirWpp()">💬</button>
      <button class="btn-comprar" onclick="abrirModal()">🛒 COMPRAR AGORA — R$ ${projeto.preco}</button>
    </div>
  `;
}

function moverCarrossel(dir){
  midiaAtual=(midiaAtual+dir+midias.length)%midias.length;
  atualizarCarrossel();
}

function irPara(i){
  midiaAtual=i;
  atualizarCarrossel();
}

function atualizarCarrossel(){
  document.getElementById('track').style.transform=`translateX(-${midiaAtual*100}%)`;
  document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===midiaAtual));
  document.querySelectorAll('.thumb').forEach((t,i)=>t.classList.toggle('active',i===midiaAtual));
  const counter=document.getElementById('counter');
  if(counter)counter.textContent=midiaAtual+1;
  const thumbEl=document.getElementById('thumb-'+midiaAtual);
  if(thumbEl)thumbEl.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
}

function getCat(c){return{terrea:'Casa Térrea',sobrado:'Sobrado',comercial:'Comercial',alto:'Alto Padrão'}[c]||c;}

function abrirModal(){
  document.getElementById('modal-titulo').textContent='Projeto: '+projeto.titulo;
  document.getElementById('pix-preco').textContent='R$ '+(parseFloat(projeto.preco)*0.9).toFixed(0)+' (10% off)';
  document.getElementById('modal').classList.add('open');
}

function fecharModal(){document.getElementById('modal').classList.remove('open');}

function irWhatsApp(pgto){
  const msg=encodeURIComponent('Olá! Quero comprar o projeto '+projeto.codigo+' — '+projeto.titulo+'. Forma de pagamento: '+pgto+'. Valor: R$ '+projeto.preco);
  window.open('https://wa.me/5521978819116?text='+msg,'_blank');
  fecharModal();
}

function abrirWpp(){
  const msg=encodeURIComponent('Olá! Tenho interesse no projeto '+projeto.codigo+' — '+projeto.titulo);
  window.open('https://wa.me/5521978819116?text='+msg,'_blank');
}

carregar();
</script>
</body>
</html>
